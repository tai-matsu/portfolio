<!DOCTYPE html>

    <link rel="stylesheet" href="../styles.css" />

  <body class="top-entry">
    <div class="page-shell works-page" id="top">
      <header class="top-header">

        <button

          aria-controls="works-navigation"
          aria-expanded="false"

          menu

        <nav class="top-nav" id="works-navigation" aria-label="Primary navigation">
          <a href="../index.html">Home</a>
          <a href="../works/index.html" aria-current="page">Works</a>
          <a href="../about/index.html">About</a>
        </nav>
      </header>

      <main class="works-page-main">
        <section class="works-page-intro">
          <div class="section-title">
            <h1>Works</h1>
          </div>
        </section>

        <section class="works-section works-section-page">
          <div class="works-grid">
            <article class="work-item">
              <a class="work-link" href="./works_detail/index.html">
                <div class="work-thumb">
                  <img src="../images/Kamiyama_thumb.png" alt="Kamiyama Third Place" />

                  <h3>Kamiyama Third Place</h3>

            <article class="work-item">

            <article class="work-item">
              <a class="work-link" href="./works_detail/index.html">

                <div class="work-body">
                  <h3>XR Text Input</h3>
                  <p>XRによる文字入力</p>
                  <span class="work-chip">XR</span>
                </div>

          <div class="detail-back-link-wrap">
            <a class="detail-back-link" href="../index.html">BACK TO HOME</a>
          </div>

      <footer class="top-footer">
        <p>© Taichi Matsusaki</p>
        <a class="back-to-top material-symbols-outlined" href="#top" aria-label="ページ上部へ戻る">expand_circle_up</a>
